<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Atlas of the Old World | Under Construction</title>
    <meta name="description" content="Atlas update in progress.">
    <style>
        :root {
            --bg0: #101820;
            --bg1: #1e2f3f;
            --accent: #d9b26b;
            --text: #f2efe9;
            --muted: #d2dbe3;
            --panel: rgba(8, 12, 18, 0.55);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 20%, rgba(217, 178, 107, 0.2), transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(109, 176, 218, 0.16), transparent 40%),
                linear-gradient(135deg, var(--bg0), var(--bg1));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: min(840px, 100%);
            background: var(--panel);
            border: 1px solid rgba(217, 178, 107, 0.35);
            border-radius: 14px;
            padding: clamp(24px, 4vw, 42px);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(3px);
        }

        .tag {
            display: inline-block;
            border: 1px solid rgba(217, 178, 107, 0.7);
            color: var(--accent);
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 12px 0 8px;
            font-size: clamp(1.8rem, 4.5vw, 3.1rem);
            line-height: 1.1;
        }

        p {
            margin: 0;
            max-width: 68ch;
            color: var(--muted);
            line-height: 1.6;
            font-size: clamp(1rem, 2.2vw, 1.15rem);
        }

        .notice {
            margin-top: 20px;
            padding: 14px 16px;
            border-left: 3px solid var(--accent);
            background: rgba(16, 24, 32, 0.55);
            border-radius: 8px;
        }

        .local-link {
            margin-top: 18px;
            font-size: 0.95rem;
            color: #b8c8d4;
        }

        .local-link a {
            color: #8ad8ff;
            text-decoration-thickness: 2px;
        }
    </style>
</head>
<body>
    <main class="panel">
        <span class="tag">Under Construction</span>
        <h1>Atlas maintenance in progress</h1>
        <p>Update coming soon, expanding the Atlas to include Norsca, Albion, the Border Princes, and Tilea!</p>
        <div class="notice">
            Work is actively in progress this weekend while major map updates are deployed.
        </div>
        <div class="local-link">
            Local testing access: <a href="/test">https://atlasoftheoldworld.com/atlas-live.html</a>
        </div>
    </main>
</body>
</html>
